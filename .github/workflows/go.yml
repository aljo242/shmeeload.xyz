name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

# Least privilege: the job only needs to read the repo.
permissions:
  contents: read

jobs:
  build-and-test:
    # Self-hosted x86 runner on foundry (dedicated instance for this repo).
    # No GitHub-hosted runners are used.
    runs-on: [self-hosted, x86-linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Build
        # make build installs web_res deps and runs tsc, then builds the Go binary.
        run: make build

      - name: Test
        run: make test

      - name: Lint Go
        # Installs and runs golangci-lint (which includes gosec) per the Makefile.
        run: make lint

      - name: Lint TypeScript
        # Runs ESLint (typescript-eslint) over web_res/src.
        run: make lint-web

      - name: Vulnerability scan
        # govulncheck flags known CVEs in Go dependencies.
        run: make vuln
