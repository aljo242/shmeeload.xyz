name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    # Self-hosted x86 runner on foundry (dedicated instance for this repo).
    # No GitHub-hosted runners are used.
    runs-on: [self-hosted, x86-linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install TypeScript
        # make build runs `tsc`; install the real compiler globally so it is on PATH.
        run: npm install -g typescript@^4.2.3

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Lint
        # Installs and runs golangci-lint (which includes gosec) per the Makefile,
        # keeping CI identical to local `make lint`.
        run: make lint
