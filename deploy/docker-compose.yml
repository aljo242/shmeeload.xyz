services:
  shmeeload:
    build:
      context: ..
      dockerfile: Dockerfile
    image: shmeeload:local
    container_name: shmeeload
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./config.local.json:/app/config.json:ro
    # Resource caps so the site can never starve Pi-hole on this box.
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/home"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
