services:
  shmeeload:
    build:
      context: ..
      dockerfile: Dockerfile
    image: shmeeload:local
    container_name: shmeeload
    restart: unless-stopped
    expose:
      - "8080"
    ports:
      # Direct HTTP fallback on the LAN. Caddy (below) serves HTTPS on 443.
      - "8080:8080"
    volumes:
      - ./config.local.json:/app/config.json:ro
    # Resource caps so the site can never starve Pi-hole on this box.
    # (Memory cap requires the memory cgroup enabled in the Pi's boot config.)
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/home"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    depends_on:
      - shmeeload
    ports:
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

volumes:
  caddy_data:
  caddy_config:
