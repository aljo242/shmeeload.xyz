services:
  shmeeload:
    build:
      context: ..
      dockerfile: Dockerfile
    image: shmeeload:local
    container_name: shmeeload
    restart: unless-stopped
    ports:
      - "443:443/tcp"
      - "443:443/udp"
    volumes:
      - ./config.local.json:/app/config.json:ro
      - shmee_tls:/data
    # Hardening: read-only root with only the cert volume + /tmp writable; drop all
    # capabilities except NET_BIND_SERVICE (needed to bind :443 as the non-root user).
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    # Resource caps so the site can never starve other services on the host.
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-qO-", "https://127.0.0.1/home"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  shmee_tls:
