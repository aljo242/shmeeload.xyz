services:
  shmeeload:
    build:
      context: ..
      dockerfile: Dockerfile
    image: shmeeload:local
    container_name: shmeeload
    restart: unless-stopped
    expose:
      - "8080"
    ports:
      # Loopback only (on-box debugging). LAN clients use https://shmee.lan via
      # Caddy; this avoids serving cleartext across the LAN and bypassing TLS.
      - "127.0.0.1:8080:8080"
    volumes:
      - ./config.local.json:/app/config.json:ro
    # Hardening: the app serves assets from memory and never writes to disk, so it
    # runs with a read-only root filesystem, no Linux capabilities, and no ability
    # to gain new privileges. /tmp is a small tmpfs in case anything needs scratch.
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    # Resource caps so the site can never starve Pi-hole on this box.
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/home"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
    container_name: caddy
    restart: unless-stopped
    depends_on:
      - shmeeload
    ports:
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    # Hardening: read-only root with only the data/config volumes writable; drop
    # all capabilities except NET_BIND_SERVICE (needed to bind :443).
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

volumes:
  caddy_data:
  caddy_config:
