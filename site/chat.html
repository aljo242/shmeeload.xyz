    <title>shmeechat</title>

    <link rel="stylesheet" type="text/css"  href="/static/css/home.css">
    <link rel="stylesheet" type="text/css"  href="/static/css/chat.css">
    <link rel="manifest" href="/manifest.json">
    <link rel="shortcut icon" href="/static/img/1favicon.ico" type="image/x-icon" />
    <link rel="apple-touch-icon" href="/static/img/1apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="57x57" href="/static/img/1apple-touch-icon-57x57.png" />
    <link rel="apple-touch-icon" sizes="72x72" href="/static/img/1apple-touch-icon-72x72.png" />
    <link rel="apple-touch-icon" sizes="76x76" href="/static/img/1apple-touch-icon-76x76.png" />
    <link rel="apple-touch-icon" sizes="114x114" href="/static/img/1apple-touch-icon-114x114.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/static/img/1apple-touch-icon-120x120.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/static/img/1apple-touch-icon-144x144.png" />

    <script type="module" src="/static/js/chat.js"></script>
</head>
<body style="background: url('/static/img/horse.jpg') center center / cover no-repeat fixed;">
  <section class="scroll">
    <nav id="nav">
      <header id="header">shmeechat</header>
      <ul>
        <li class="navLink"><a href="/home">home</a></li>
        <li class="navLink"><a href="/resume/home">resume</a></li>
        <li class="navLink"><a href="/hall-of-art/home">hall of art</a></li>
        <li class="navLink"><a href="https://github.com/aljo242" target="_blank" rel="noopener noreferrer">github</a></li>
      </ul>
      <footer id="nav_footer">
        <div id="copy">&copy; djinntek</div>
        <div id="bonus_button">
          <input width="100" height="100" type="image" id="secretButton" src="/static/img/turbo_shadow_pixel_OG5.png" alt="shhhhh its a secret"/>
        </div>
      </footer>
    </nav>

    <article id="mainArticleBody">
      <h1 class="Header">shmeechat</h1>
      <div id="rooms" aria-label="chat rooms"></div>
      <div id="roster" aria-label="online users"></div>
      <div id="log" aria-live="polite"></div>
      <form id="send_msg_form">
        <input type="text" id="msg" size="64" aria-label="message" autocomplete="off" autofocus />
        <input type="submit" value="send" />
      </form>
    </article>
  </section>

  <div class="loginPopUp">
    <div class="formPopUp" id="popUpForm" role="dialog" aria-modal="true" aria-labelledby="popUpTitle">
      <form class="formContainer">
        <h2 id="popUpTitle">pick a name</h2>
        <label for="chatname"><strong>name</strong></label>
        <input type="text" id="chatname" placeholder="big boss ben" name="chatname" required>
        <button type="button" id="signInButton" class="btn">enter</button>
      </form>
    </div>
  </div>



</body>
</html>
